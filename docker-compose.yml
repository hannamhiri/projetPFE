services:
  postgres:
    image: postgres:15
    container_name: postgres_warehouse
    environment:
      POSTGRES_USER: warehouse
      POSTGRES_PASSWORD: warehouse
      POSTGRES_DB: warehouse_db
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - default

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - default

  spark:
    build: ./spark
    container_name: spark_clean
    depends_on:
      - postgres
    volumes:
      - ./spark/jobs:/opt/jobs
    ports:
      - "8888:8888"
      - "8080:8080"
    networks:
      - default

  dbt:
    build: ./dbt
    container_name: dbt_gold
    depends_on:
      - postgres
      - clickhouse
    volumes:
      - ./dbt:/dbt
    ports:
      - "8085:8085"
    networks:
      - default

  clickhouse:
    image: clickhouse/clickhouse-server:23.8
    container_name: clickhouse_gold
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    environment:
      CLICKHOUSE_DB: gold
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: clickhouse123
    networks:
      - default

  cloudbeaver:
    image: dbeaver/cloudbeaver:23.2.0
    container_name: cloudbeaver
    restart: unless-stopped
    ports:
      - "8978:8978"
    volumes:
      - ./cloudbeaver-config:/opt/cloudbeaver/workspace
    depends_on:
      - postgres
      - clickhouse
    networks:
      - default

  # ──────────────────────────────────────────────────────────────
  # DAGSTER
  # ──────────────────────────────────────────────────────────────
  dagster_postgresql:
    image: postgres:15
    container_name: dagster_postgresql
    environment:
      POSTGRES_USER: dagster
      POSTGRES_PASSWORD: dagster
      POSTGRES_DB: dagster
    volumes:
      - dagster_pg_data:/var/lib/postgresql/data
    networks:
      - default

  dagster_webserver:
    build: ./dagster
    container_name: dagster_webserver
    entrypoint: dagster-webserver -h 0.0.0.0 -p 3000 -w /dagster/workspace.yaml
    ports:
      - "3000:3000"
    environment:
      DAGSTER_HOME: /dagster
      AIRBYTE_URL: http://host.docker.internal:8000
      AIRBYTE_CONNECTION_ID: 012ac2da-0a87-4781-8930-2f3fa69063c5
      AIRBYTE_CLIENT_ID: 2118c7f2-94f7-46fa-a2a0-71e044c8badd
      AIRBYTE_CLIENT_SECRET: Lwz1MWLeoMXNtrPHK95Rj5u92abORNC4
      DBT_PROJECT_DIR: /dbt
      DBT_PROFILES_DIR: /dbt
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: 8123
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: clickhouse123
      DAGSTER_SMTP_HOST: smtp.gmail.com
      DAGSTER_SMTP_PORT: "587"
      DAGSTER_SMTP_USER: hanna.mhiri@gmail.com
      DAGSTER_SMTP_PASSWORD: mlylqjziekfggrfl
      DAGSTER_EMAIL_FROM: hanna.mhiri@gmail.com
      DAGSTER_EMAIL_TO: hmhiri@spark-it.fr
    volumes:
      - ./dagster:/dagster
      - ./dbt:/dbt
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - default

  dagster_daemon:
    build: ./dagster
    container_name: dagster_daemon
    entrypoint: dagster-daemon run -w /dagster/workspace.yaml
    environment:
      DAGSTER_HOME: /dagster
      AIRBYTE_URL: http://host.docker.internal:8000
      AIRBYTE_CONNECTION_ID: 012ac2da-0a87-4781-8930-2f3fa69063c5
      AIRBYTE_CLIENT_ID: 2118c7f2-94f7-46fa-a2a0-71e044c8badd
      AIRBYTE_CLIENT_SECRET: Lwz1MWLeoMXNtrPHK95Rj5u92abORNC4
      DBT_PROJECT_DIR: /dbt
      DBT_PROFILES_DIR: /dbt
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: 8123
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: clickhouse123
      CUBEJS_URL: http://cubejs:4000
      CUBEJS_API_SECRET: sagap_cube_secret_2024_pfe_decisonnel_open_source
      DAGSTER_SMTP_HOST: smtp.gmail.com
      DAGSTER_SMTP_PORT: "587"
      DAGSTER_SMTP_USER: hanna.mhiri@gmail.com
      DAGSTER_SMTP_PASSWORD: mlylqjziekfggrfl
      DAGSTER_EMAIL_FROM: hanna.mhiri@gmail.com
      DAGSTER_EMAIL_TO: hmhiri@spark-it.fr
    volumes:
      - ./dagster:/dagster
      - ./dbt:/dbt
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - default

  # ──────────────────────────────────────────────────────────────
  # CUBE.JS latest — PostgreSQL SQL API gratuite en dev mode
  # ──────────────────────────────────────────────────────────────
  cubejs:
    build: ./cubejs
    container_name: cubejs
    ports:
      - "4000:4000"     # Playground UI + REST API
      - "15432:15432"   # PostgreSQL SQL API
    environment:
      # Source : ClickHouse Gold
      CUBEJS_DB_TYPE: clickhouse
      CUBEJS_DB_HOST: clickhouse
      CUBEJS_DB_PORT: "8123"
      CUBEJS_DB_NAME: gold
      CUBEJS_DB_USER: default
      CUBEJS_DB_PASS: clickhouse123

      # API Secret
      CUBEJS_API_SECRET: sagap_cube_secret_2024_pfe_decisonnel_open_source
      CUBEJS_DEV_MODE: "true"

      # PostgreSQL SQL API — disponible en dev mode
      CUBEJS_PG_SQL_PORT: "15432"
      CUBEJS_SQL_USER: cube
      CUBEJS_SQL_PASSWORD: sagap_cube_secret_2024_pfe_decisonnel_open_source

      # Optimisations
      CUBEJS_CONCURRENCY: "4"
      CUBEJS_DB_MAX_POOL: "8"
      CUBEJS_CACHE_AND_QUEUE_DRIVER: "memory"
      NODE_OPTIONS: "--max-old-space-size=2048"
      CUBEJS_REFRESH_WORKER: "true"
    volumes:
      - ./cubejs:/cube/conf
    depends_on:
      - clickhouse
    networks:
      - default

  superset:
    build: ./superset
    container_name: superset
    ports:
      - "8088:8088"
    environment:
      SUPERSET_SECRET_KEY: "sagap_superset_secret_2024_pfe"
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin123
      ADMIN_EMAIL: admin@sagap.tn
      ADMIN_FIRSTNAME: SAGAP
      ADMIN_LASTNAME: Admin
    volumes:
      - superset_home:/app/superset_home
      - ./superset/sync_cube_to_superset.py:/app/sync_cube_to_superset.py
    depends_on:
      - clickhouse
      - cubejs
    networks:
      - default
  # ──────────────────────────────────────────────────────────────
  # MLFLOW
  # ──────────────────────────────────────────────────────────────
  mlflow:
    build: ./mlflow          # ← remplacer image: par build:
    container_name: mlflow
    ports:
      - "5000:5000"
    environment:
      MLFLOW_BACKEND_STORE_URI: postgresql://warehouse:warehouse@postgres:5432/warehouse_db
      MLFLOW_ARTIFACT_ROOT: /mlflow/artifacts
    volumes:
      - ./mlflow/artifacts:/mlflow/artifacts
    command: >
      mlflow server
        --backend-store-uri postgresql://warehouse:warehouse@postgres:5432/warehouse_db
        --default-artifact-root /mlflow/artifacts
        --host 0.0.0.0
    depends_on:
      - postgres
    networks:
      - default

  # ──────────────────────────────────────────────────────────────
  # ML ENGINE
  # ──────────────────────────────────────────────────────────────
  ml:
    build: ./ml
    container_name: ml_engine
    ports:
      - "8889:8888"        # ← Jupyter accessible sur localhost:8889
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: "8123"
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: clickhouse123
      CLICKHOUSE_DB: gold
    volumes:
      - ./ml:/app          # ← tes notebooks sauvegardés sur ta machine
    depends_on:
      - mlflow
      - clickhouse
    networks:
      - default

volumes:
  pg_data:
  clickhouse_data:
  dagster_pg_data:
  superset_home:
  mlflow_artifacts:

networks:
  default:
    driver: bridge
